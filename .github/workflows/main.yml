name: kill_pv2 Terminal-Only Pure Logging Panel

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  # ۱. جاب مخصوص اتصال با آی‌پی تمیز کلودفلر
  run-clean-ip-panel:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      run: |
        python3 -m pip install --upgrade pip

    - name: Install Xray Core
      run: |
        sudo bash -c "$(curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh)" @ install
        sudo mkdir -p /usr/local/etc/xray
        sudo chmod -R 777 /usr/local/etc/xray

    - name: Install and Configure Nginx Reverse Proxy
      run: |
        sudo apt-get update && sudo apt-get install -y nginx
        sudo rm -f /etc/nginx/sites-enabled/default
        cat <<'PANEL_EOF' | sudo tee /etc/nginx/sites-available/tg_panel_proxy
        server {
            listen 8080 default_server;
            listen [::]:8080 default_server;

            location /killpv2 {
                proxy_redirect off;
                proxy_pass http://127.0.0.1:8085;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }

            location /sub/ {
                proxy_pass http://127.0.0.1:8086;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }
        }
        PANEL_EOF
        sudo ln -s /etc/nginx/sites-available/tg_panel_proxy /etc/nginx/sites-enabled/
        sudo systemctl restart nginx

    - name: Connect Cloudflare Tunnel (Anti-Filter)
      run: |
        wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared-linux-amd64.deb
        
        nohup cloudflared tunnel --url http://localhost:8080 > cloudflare.log 2>&1 &
        
        for i in {1..30}; do
          HOST=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' cloudflare.log | head -n 1 | sed 's/https:\/\///g')
          if [ ! -z "$HOST" ]; then
              echo "Tunnel Connected Successfully: $HOST"
              echo "$HOST" > tunnel_host.txt
              break
          fi
          echo "Waiting for Cloudflare Tunnel to generate host... ($i/30)"
          sleep 2
        done
        
        if [ ! -f tunnel_host.txt ]; then
          echo "Error: Cloudflare Tunnel failed to start!"
          exit 1
        fi

    - name: Run Logging Core (Clean IP Mode)
      run: |
        cat <<'PANEL_EOF' > core_logger.py
        import subprocess
        import os
        import time
        import json
        import re
        from http.server import BaseHTTPRequestHandler, HTTPServer
        import threading
        import base64

        CONFIG_PATH = "/usr/local/etc/xray/config.json"
        db_file = "panel_db.json"
        ONLINE_TIMEOUT = 120
        CLEAN_IP_TARGET = "speed.cloudflare.com" # آی‌پی تمیز پیش‌فرض

        with open('tunnel_host.txt', 'r') as f:
            tunnel_host = f.read().strip()

        configs_db = {
            "Main_kill_pv2": {
                "uuid": "b6a00fb0-460e-4323-96af-3ba2f48470ee",
                "limit": 0,
                "type": "clean",
                "clean_ip": CLEAN_IP_TARGET,
                "used": 0,
                "xray_last": 0,
                "status": "OFFLINE",
                "last_seen": 0
            }
        }

        def rebuild_xray():
            clients = [{"id": data["uuid"], "email": name, "level": 0} for name, data in configs_db.items()]
            xray_config = {
                "log": {"loglevel": "warning"},
                "api": {"tag": "api", "services": ["StatsService"]},
                "stats": {},
                "policy": {
                    "levels": {"0": {"statsUserUplink": True, "statsUserDownlink": True}},
                    "system": {"statsInboundUplink": True, "statsInboundDownlink": True}
                },
                "inbounds": [
                    {
                        "port": 8085,
                        "protocol": "vless",
                        "settings": {"clients": clients, "decryption": "none"},
                        "streamSettings": {"network": "ws", "wsSettings": {"path": "/killpv2"}}
                    },
                    {
                        "listen": "127.0.0.1",
                        "port": 10085,
                        "protocol": "dokodemo-door",
                        "settings": {"address": "127.0.0.1"},
                        "tag": "api"
                    }
                ],
                "outbounds": [{"protocol": "freedom", "tag": "direct"}, {"protocol": "freedom", "tag": "api"}],
                "routing": {
                    "domainStrategy": "AsIs",
                    "rules": [{"type": "field", "inboundTag": ["api"], "outboundTag": "api"}]
                }
            }
            with open(CONFIG_PATH, 'w') as f:
                json.dump(xray_config, f, indent=4)
            subprocess.run("sudo killall xray || true", shell=True)
            subprocess.run("sudo nohup /usr/local/bin/xray -config /usr/local/etc/xray/config.json > /usr/local/etc/xray/xray.log 2>&1 &", shell=True)

        class SubscriptionServer(BaseHTTPRequestHandler):
            def log_message(self, format, *args): return
            def do_GET(self):
                path_clean = self.path.strip("/").replace("sub/", "", 1)
                if path_clean in configs_db:
                    data = configs_db[path_clean]
                    info_line = f"vless://{data['uuid']}@127.0.0.1:10000?encryption=none&type=ws#📊_Traffic_Logging_Active"
                    vless_line = f"vless://{data['uuid']}@{CLEAN_IP_TARGET}:443?path=%2Fkillpv2&security=tls&encryption=none&insecure=0&type=ws&allowInsecure=0&host={tunnel_host}&sni={tunnel_host}#{path_clean}"
                    sub_content = f"{info_line}\n{vless_line}\n"
                    b64_res = base64.b64encode(sub_content.encode('utf-8')).decode('utf-8')
                    self.send_response(200)
                    self.send_header('Content-Type', 'text/plain; charset=utf-8')
                    self.end_headers()
                    self.wfile.write(b64_res.encode('utf-8'))
                    return
                self.send_response(404)
                self.end_headers()

        def traffic_loop():
            while True:
                time.sleep(10)
                current_time = time.time()
                # استفاده از فرمت تست شده جدید کامند برای استخراج دقیق
                query_cmd = '/usr/local/bin/xray api statsquery --server=127.0.0.1:10085 --pattern="user>>>" --reset=false'
                q_res = subprocess.run(query_cmd, shell=True, capture_output=True, text=True)
                q_out = q_res.stdout if q_res.stdout else ""
                
                print("\n================== TERMINAL LIVE LOGS ==================")
                print(f"🔗 Cloudflare Domain: https://{tunnel_host}/sub/Main_kill_pv2")
                print(f"📡 Connection Link (Clean IP): vless://b6a00fb0-460e-4323-96af-3ba2f48470ee@{CLEAN_IP_TARGET}:443?path=%2Fkillpv2&security=tls&encryption=none&insecure=0&type=ws&allowInsecure=0&host={tunnel_host}&sni={tunnel_host}#Main_kill_pv2")
                
                for name, data in configs_db.items():
                    db, ub = 0, 0
                    if q_out:
                        db_match = re.search(r'user>>>' + re.escape(name) + r'>>>traffic>>>downlink[\s\S]*?(?:"value":\s*"(\d+)"|value:\s*(\d+))', q_out)
                        ub_match = re.search(r'user>>>' + re.escape(name) + r'>>>traffic>>>uplink[\s\S]*?(?:"value":\s*"(\d+)"|value:\s*(\d+))', q_out)
                        if db_match: db = int(db_match.group(1) or db_match.group(2) or 0)
                        if ub_match: ub = int(ub_match.group(1) or ub_match.group(2) or 0)
                    
                    current_bytes = db + ub
                    diff = current_bytes - data["xray_last"]
                    if diff > 0:
                        configs_db[name]["used"] += diff
                        configs_db[name]["status"] = "ONLINE"
                        configs_db[name]["last_seen"] = current_time
                    else:
                        if current_time - data["last_seen"] > ONLINE_TIMEOUT:
                            configs_db[name]["status"] = "OFFLINE"
                    
                    configs_db[name]["xray_last"] = current_bytes
                    print(f"👤 User: {name} | 🚦 Status: {configs_db[name]['status']} | 📤 Usage: {configs_db[name]['used'] / (1024*1024):.2f} MB")
                print("========================================================\n")

        rebuild_xray()
        threading.Thread(target=lambda: HTTPServer(('127.0.0.1', 8086), SubscriptionServer).serve_forever(), daemon=True).start()
        threading.Thread(target=traffic_loop, daemon=True).start()
        time.sleep(19800)
        PANEL_EOF
        python3 -u core_logger.py

    - name: Trigger Next Chain Run
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
      run: |
        gh workflow run panel.yml --ref main
        echo "✅ جاب بعدی استارت خورد."


  # ۲. جاب مخصوص اتصال معمولی (بدون آی‌پی تمیز)
  run-regular-ip-panel:
